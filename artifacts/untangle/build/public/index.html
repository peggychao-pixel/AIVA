<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Untangle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/assets/index-BHoJfufA.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DMe8MGNA.css">
  </head>
  <body>
    <div id="__untangle_debug__" style="position:fixed;top:0;left:0;right:0;padding:12px 16px;background:#fef9c3;color:#713f12;font-family:monospace;font-size:12px;z-index:99999;border-bottom:1px solid #fde68a;">
      Loading Untangle...
    </div>
    <script>
      window.__UNTANGLE_MOUNTED__ = false;
      var __d = document.getElementById('__untangle_debug__');
      __d.textContent = 'Loading... href=' + location.href + ' | ua=' + navigator.userAgent.slice(0, 60);
      setTimeout(function() {
        if (!window.__UNTANGLE_MOUNTED__) {
          __d.style.background = '#fee2e2';
          __d.style.color = '#991b1b';
          __d.style.padding = '20px 16px';
          __d.style.position = 'static';
          __d.style.fontSize = '14px';
          __d.innerHTML =
            '<h2 style="margin:0 0 8px">⚠ App not loaded after 8 seconds</h2>' +
            '<p style="margin:4px 0"><b>URL:</b> ' + location.href + '</p>' +
            '<p style="margin:4px 0"><b>pathname:</b> ' + location.pathname + '</p>' +
            '<p style="margin:4px 0"><b>UA:</b> ' + navigator.userAgent + '</p>' +
            '<p style="margin:4px 0">Open browser DevTools → Console for JS errors.</p>';
        }
      }, 8000);
    </script>
    <div id="root"></div>
  </body>
</html>
